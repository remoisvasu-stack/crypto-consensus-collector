# Render Blueprint — COLLECTOR only (its own Render account).
# Build context is this folder, so it works as a Blueprint whether this folder is
# its own repo root or you create the service manually with Root Directory=collector.
#
# Deploy: Render Dashboard (collector account) -> New -> Blueprint -> this folder/repo.
# Region Frankfurt reaches Binance directly (sidesteps HTTP 451).
services:
  - type: web
    name: btc-collector
    runtime: docker
    region: frankfurt
    plan: free                      # own account = own ~750 free hrs; ping /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: HF_TOKEN
        sync: false                 # write token (secret)
      - key: HF_DATASET_REPO
        value: hugfacmaster/btc-consensus-data
      - key: HISTORY_FILENAME
        value: training_history.csv
      - key: BRAIN_URL
        sync: false                 # https://<your-space>.hf.space
      - key: WEBHOOK_TOKEN
        sync: false                 # must match the brain's WEBHOOK_TOKEN
      - key: POLL_INTERVAL
        value: "60"
      - key: FLUSH_MINUTES
        value: "10"
      - key: SKIP_SAME_DAY_EXPIRY
        value: "true"
      - key: MIN_EXPIRY_HOURS
        value: "3"
